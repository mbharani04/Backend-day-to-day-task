/* ============================================================
   AUTH CONTEXT — localStorage based
   ============================================================ */
const AuthContext = createContext(null);
const useAuth = () => useContext(AuthContext);

function AuthProvider({ children }) {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('jslearn_user')) || null; } catch { return null; }
  });
  const [otp, setOtp] = useState(() => localStorage.getItem('jslearn_otp') || null);
  const [isVerified, setIsVerified] = useState(() => localStorage.getItem('jslearn_verified') === 'true');
  const [bookmarks, setBookmarks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('jslearn_bookmarks')) || []; } catch { return []; }
  });
  const [completed, setCompleted] = useState(() => {
    try { return JSON.parse(localStorage.getItem('jslearn_completed')) || []; } catch { return []; }
  });

  const generateOtp = () => {
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    localStorage.setItem('jslearn_otp', code);
    setOtp(code);
    return code;
  };

  const register = (formData) => {
    const newUser = { name: formData.name, email: formData.email, password: formData.password };
    localStorage.setItem('jslearn_user', JSON.stringify(newUser));
    localStorage.setItem('jslearn_verified', 'false');
    setUser(newUser);
    setIsVerified(false);
    return generateOtp();
  };

  const verifyOtp = (code) => {
    const stored = localStorage.getItem('jslearn_otp');
    if (code === stored) {
      localStorage.setItem('jslearn_verified', 'true');
      setIsVerified(true);
      return true;
    }
    return false;
  };

  const logout = () => {
    localStorage.removeItem('jslearn_user');
    localStorage.removeItem('jslearn_verified');
    localStorage.removeItem('jslearn_otp');
    setUser(null);
    setIsVerified(false);
  };

  const toggleBookmark = (topicId) => {
    setBookmarks(prev => {
      const next = prev.includes(topicId) ? prev.filter(id => id !== topicId) : [...prev, topicId];
      localStorage.setItem('jslearn_bookmarks', JSON.stringify(next));
      return next;
    });
  };

  const markCompleted = (topicId) => {
    setCompleted(prev => {
      if (prev.includes(topicId)) return prev;
      const next = [...prev, topicId];
      localStorage.setItem('jslearn_completed', JSON.stringify(next));
      return next;
    });
  };

  return (
    <AuthContext.Provider value={{ user, otp, isVerified, bookmarks, completed, generateOtp, register, verifyOtp, logout, toggleBookmark, markCompleted }}>
      {children}
    </AuthContext.Provider>
  );
}

function Register({ navigate }) {
  const { register } = useAuth();
  const [form, setForm] = useState({ name: '', email: '', password: '', confirm: '' });
  const [errors, setErrors] = useState({});
  const [devOtp, setDevOtp] = useState(null);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Full name is required';
    if (!form.email.trim()) e.email = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';
    if (!form.password) e.password = 'Password is required';
    else if (form.password.length < 8) e.password = 'Minimum 8 characters';
    if (form.confirm !== form.password) e.confirm = 'Passwords do not match';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = (ev) => {
    ev.preventDefault();
    if (!validate()) return;
    const code = register(form);
    setDevOtp(code);
    setTimeout(() => navigate('verify'), 900);
  };

  return (
    <div className="min-h-screen grid-fade flex items-center justify-center px-5 py-16">

          {[
            { key: 'name', label: 'Full Name', type: 'text', placeholder: 'Bharani Kumar' },
            { key: 'email', label: 'Email', type: 'email', placeholder: 'you@example.com' },
            { key: 'password', label: 'Password', type: 'password', placeholder: 'Minimum 8 characters' },
            { key: 'confirm', label: 'Confirm Password', type: 'password', placeholder: 'Re-enter password' },
          ].map(f => (
            <div key={f.key}>
              <label className="block text-xs font-medium text-slate-300 mb-1.5">{f.label}</label>
              <input
                type={f.type}

    </div>
  );
}

function VerifyOTP({ navigate }) {
  const { user, otp, verifyOtp, generateOtp } = useAuth();
  const [digits, setDigits] = useState(Array(6).fill(''));
  const [error, setError] = useState('');
  const [timer, setTimer] = useState(120);
  const inputsRef = useRef([]);

  useEffect(() => {
    if (timer <= 0) return;
    const t = setInterval(() => setTimer(s => s - 1), 1000);
    return () => clearInterval(t);
  }, [timer]);

  const mm = String(Math.floor(timer / 60)).padStart(2, '0');
  const ss = String(timer % 60).padStart(2, '0');

  const handleChange = (i, val) => {
    if (!/^[0-9]?$/.test(val)) return;
    const next = [...digits]; next[i] = val; setDigits(next);
    if (val && i < 5) inputsRef.current[i + 1]?.focus();
  };
  const handleKeyDown = (i, e) => {
    if (e.key === 'Backspace' && !digits[i] && i > 0) inputsRef.current[i - 1]?.focus();
  };
  const handlePaste = (e) => {
    const text = e.clipboardData.getData('text').slice(0, 6).split('');
    if (text.every(c => /[0-9]/.test(c))) { setDigits([...text, ...Array(6 - text.length).fill('')]); }
  };

  const handleVerify = () => {
    const code = digits.join('');
    if (code.length < 6) { setError('Enter all 6 digits'); return; }
    if (verifyOtp(code)) { navigate('home'); }
    else setError('Invalid OTP. Please try again.');
  };

  const resend = () => { generateOtp(); setTimer(120); setDigits(Array(6).fill('')); setError(''); };

  return (
    <div className="min-h-screen grid-fade flex items-center justify-center px-5 py-16">
      <div className="w-full max-w-md fade-up glass rounded-2xl p-6 shadow-card text-center">
        <div className="w-12 h-12 rounded-xl bg-accent/20 border border-accent/40 text-accent flex items-center justify-center text-2xl mx-auto mb-4">🔐</div>
        <h1 className="font-display text-2xl font-bold text-white">Verify your email</h1>
        <p className="text-muted text-sm mt-1 mb-6">Code sent to <span className="text-jsyellow">{user?.email}</span></p>

        <div className="flex justify-center gap-2 mb-4" onPaste={handlePaste}>
          {digits.map((d, i) => (
            <input key={i} ref={el => inputsRef.current[i] = el} value={d} maxLength={1}
              onChange={(e) => handleChange(i, e.target.value)}
              onKeyDown={(e) => handleKeyDown(i, e)}
              className="w-11 h-13 md:w-12 md:h-14 text-center text-lg font-mono bg-surface2 border border-white/10 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-jsyellow/60" />
          ))}
        </div>

        {error && <p className="text-rose-400 text-xs mb-3">{error}</p>}

        <p className="text-xs text-muted mb-1">Code expires in <span className="text-jsyellow font-mono">{mm}:{ss}</span></p>
        {otp && <p className="text-[11px] text-muted mb-4">(dev preview OTP: <span className="font-mono text-emerald-400">{otp}</span>)</p>}

        <button onClick={handleVerify} className="w-full py-3 rounded-lg bg-jsyellow text-bg font-semibold hover:brightness-95 transition mb-3">
          Verify &amp; Continue
        </button>
        <button onClick={resend} disabled={timer > 0} className="text-xs text-muted hover:text-jsyellow disabled:opacity-40 transition">
          Resend OTP
        </button>
      </div>
    </div>
  );
}

        </div>

        <div>
          <h3 className="text-jsyellow font-semibold mb-2 font-mono text-sm">CODE EXAMPLE &amp; OUTPUT</h3>
          <CodeBlock code={topic.example} output={topic.output} />
        </div>

        <div>
          <h3 className="text-jsyellow font-semibold mb-2 font-mono text-sm">REAL-WORLD EXAMPLE</h3>
          <p className="text-slate-300">{topic.realWorldExample}</p>
        </div>

        <div className="grid md:grid-cols-2 gap-8">
          <ListBlock title="Advantages" items={topic.advantages} tone="text-emerald-400" />
          <ListBlock title="Disadvantages" items={topic.disadvantages} tone="text-rose-400" />
        </div>

        <ListBlock title="Best Practices" items={topic.bestPractices} tone="text-accent" />

        <div>
          <h3 className="text-white font-semibold mb-3">Interview Questions</h3>
          <div className="space-y-2">
            {topic.interviewQuestions.map((q, i) => (
              <div key={i} className="glass rounded-lg px-4 py-3 text-sm text-slate-300 flex gap-2">
                <span className="text-jsyellow font-mono">Q{i + 1}.</span>{q}
              </div>
            ))}
          </div>
        </div>

        <div className="glass rounded-2xl p-5 border-l-4 border-jsyellow">
          <h4 className="text-white font-semibold mb-1">Summary</h4>
          <p className="text-slate-300 text-sm">{topic.summary}</p>
        </div>

        <button onClick={() => markCompleted(topic.id)}
          className={`w-full py-3 rounded-lg font-semibold transition ${isCompleted ? 'bg-emerald-400/10 text-emerald-400 border border-emerald-400/30' : 'bg-jsyellow text-bg hover:brightness-95'}`}>
          {isCompleted ? '✓ Completed' : 'Mark as Completed'}
        </button>

        <div className="flex items-center justify-between pt-6 border-t border-white/5">
          {prev ? (
            <button onClick={() => navigate('topic-details', prev.slug)} className="text-sm text-muted hover:text-jsyellow">← {prev.title}</button>
          ) : <span></span>}
          {next ? (
            <button onClick={() => navigate('topic-details', next.slug)} className="text-sm text-muted hover:text-jsyellow">{next.title} →</button>
          ) : <span></span>}
        </div>
      </section>
    </div>
  );
}

function StatCard({ label, value, emoji }) {
  return (
    <div className="glass rounded-2xl p-5 fade-up">
      <div className="text-2xl mb-2">{emoji}</div>
      <div className="text-2xl font-display font-bold text-white">{value}</div>
      <div className="text-xs text-muted mt-1">{label}</div>
    </div>
  );
}

function Dashboard({ navigate }) {
  const { user, completed, bookmarks } = useAuth();
  const total = TOPICS.length;
  const pct = Math.round((completed.length / total) * 100);
  const bookmarkedTopics = TOPICS.filter(t => bookmarks.includes(t.id));

  return (
    <div>
      <PageBanner emoji="📊" eyebrow={`// welcome back, ${user?.name?.split(' ')[0] || 'learner'}`} title="Your Dashboard" subtitle="Track your progress across the curriculum." />
      <section className="max-w-7xl mx-auto px-5 md:px-8 py-14 space-y-12">
        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
          <StatCard label="Topics Completed" value={`${completed.length}/${total}`} emoji="✅" />
          <StatCard label="Bookmarked" value={bookmarks.length} emoji="⭐" />
          <StatCard label="Overall Progress" value={`${pct}%`} emoji="📈" />
          <StatCard label="Achievements" value={pct >= 100 ? '🏆 1' : '0'} emoji="🎯" />
        </div>

        <div>
          <h3 className="text-white font-semibold mb-3">Learning Progress</h3>
          <div className="w-full h-3 bg-surface2 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-jsyellow to-amber-400 transition-all duration-700" style={{ width: `${pct}%` }}></div>
          </div>
          <p className="text-xs text-muted mt-2">{pct}% of the curriculum completed</p>
        </div>

        <div>
          <h3 className="text-white font-semibold mb-3">Bookmarked Topics</h3>
          {bookmarkedTopics.length === 0 ? (
            <p className="text-sm text-muted">No bookmarks yet — star a topic to save it here.</p>
          ) : (
            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
              {bookmarkedTopics.map((t, i) => <TopicCard key={t.id} topic={t} navigate={navigate} index={i} />)}
            </div>
          )}
        </div>
      </section>
    </div>
  );
}

function About({ navigate }) {
  return (
    <div>
      <PageBanner emoji="🎯" eyebrow="// our story" title="About JS Learn" subtitle="Built by developers who wished this existed when they were learning." />
      <section className="max-w-5xl mx-auto px-5 md:px-8 py-14 space-y-14">
        <div className="grid md:grid-cols-2 gap-8">
          <div className="glass rounded-2xl p-6">
            <h3 className="text-jsyellow font-semibold mb-2">🎯 Mission</h3>
            <p className="text-slate-300 text-sm">Make JavaScript genuinely understandable — not just memorized — through real examples, clear explanations, and interview-focused practice.</p>
          </div>
          <div className="glass rounded-2xl p-6">
            <h3 className="text-jsyellow font-semibold mb-2">🔭 Vision</h3>
            <p className="text-slate-300 text-sm">To be the platform freshers and career-switchers turn to when they need to go from "I can code" to "I can explain how it works."</p>
          </div>
        </div>

        <div>
          <h3 className="text-white font-semibold mb-4">Platform Statistics</h3>
          <div className="grid sm:grid-cols-3 gap-5">
            <StatCard label="Core Topics" value={TOPICS.length} emoji="📚" />
            <StatCard label="Code Examples" value={TOPICS.length} emoji="💻" />
            <StatCard label="Interview Questions" value={TOPICS.length * 3} emoji="❓" />
          </div>
        </div>

        <div>
          <h3 className="text-white font-semibold mb-4">Timeline</h3>
          <div className="space-y-4 border-l border-white/10 pl-6">
            {[
              ['Idea', 'Started as personal interview-prep notes.'],
              ['V1', 'Built the core topic structure and dark UI.'],
              ['V2', 'Added auth, OTP verification, and progress tracking.'],
              ['Today', 'A single-file platform anyone can run instantly.'],
            ].map(([t, d], i) => (
              <div key={i} className="relative">
                <span className="absolute -left-[29px] top-1 w-3 h-3 rounded-full bg-jsyellow"></span>
                <h4 className="text-white text-sm font-semibold">{t}</h4>
                <p className="text-muted text-sm">{d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    </div>
  );
}

function Contact({ navigate }) {
  const [form, setForm] = useState({ name: '', email: '', message: '' });
  const [sent, setSent] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    const messages = JSON.parse(localStorage.getItem('jslearn_messages') || '[]');
    messages.push({ ...form, date: new Date().toISOString() });
    localStorage.setItem('jslearn_messages', JSON.stringify(messages));
    setSent(true);
    setForm({ name: '', email: '', message: '' });
    setTimeout(() => setSent(false), 3000);
  };

  return (
    <div>
      <PageBanner emoji="✉️" eyebrow="// let's talk" title="Contact Us" subtitle="Questions, feedback, or found a bug? Send it over." />
      <section className="max-w-xl mx-auto px-5 md:px-8 py-14">
        <form onSubmit={submit} className="glass rounded-2xl p-6 space-y-4 shadow-card relative">
          <div>
            <label className="block text-xs font-medium text-slate-300 mb-1.5">Name</label>
            <input required value={form.name} onChange={e => setForm({ ...form, name: e.target.value })}
              className="w-full bg-surface2 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-jsyellow/60" />
          </div>
          <div>
            <label className="block text-xs font-medium text-slate-300 mb-1.5">Email</label>
            <input required type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })}
              className="w-full bg-surface2 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-jsyellow/60" />
          </div>
          <div>
            <label className="block text-xs font-medium text-slate-300 mb-1.5">Message</label>
            <textarea required rows="4" value={form.message} onChange={e => setForm({ ...form, message: e.target.value })}
              className="w-full bg-surface2 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-jsyellow/60"></textarea>
          </div>
          <button className="w-full py-3 rounded-lg bg-jsyellow text-bg font-semibold hover:brightness-95 transition">Send Message</button>
          {sent && (
            <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-emerald-400 text-bg text-xs font-semibold px-4 py-1.5 rounded-full shadow-card">
              ✓ Message sent!
            </div>
          )}
        </form>
      </section>
    </div>
  );
}

function NotFound({ navigate }) {
  return (
    <div className="min-h-[70vh] flex flex-col items-center justify-center text-center px-5">
      <div className="text-6xl mb-4">🧭</div>
      <h1 className="font-display text-3xl font-bold text-white mb-2">404 — Page Not Found</h1>
      <p className="text-muted mb-6">That route doesn't exist in this codebase.</p>
      <button onClick={() => navigate('home')} className="px-5 py-2.5 rounded-lg bg-jsyellow text-bg font-semibold">Back to Home</button>
    </div>
  );
}

/* ============================================================
   SCROLL TO TOP + ROOT APP (simple state-based router)
   ============================================================ */
function ScrollToTopButton() {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 400);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  if (!show) return null;
  return (
    <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
      className="fixed bottom-6 right-6 w-11 h-11 rounded-full bg-jsyellow text-bg font-bold shadow-glow z-40">
      ↑
    </button>
  );
}

function AppShell() {
  const { isVerified } = useAuth();
  const [route, setRoute] = useState(isVerified ? 'home' : 'register');
  const [param, setParam] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { const t = setTimeout(() => setLoading(false), 600); return () => clearTimeout(t); }, []);

  const navigate = (r, p = null) => { setRoute(r); setParam(p); window.scrollTo(0, 0); };

  useEffect(() => {
    if (!isVerified && !['register', 'verify'].includes(route)) navigate('register');
  }, [isVerified]);

  if (loading) return <Loader />;

  const protectedRoutes = ['home', 'topics', 'topic-details', 'dashboard', 'about', 'contact'];
  if (protectedRoutes.includes(route) && !isVerified) {
    return <Register navigate={navigate} />;
  }

  let page;
  switch (route) {
    case 'register': page = <Register navigate={navigate} />; break;
    case 'verify': page = <VerifyOTP navigate={navigate} />; break;
    case 'home': page = <Home navigate={navigate} />; break;
    case 'topics': page = <TopicsPage navigate={navigate} />; break;
    case 'topic-details': page = <TopicDetails slug={param} navigate={navigate} />; break;
    case 'dashboard': page = <Dashboard navigate={navigate} />; break;
    case 'about': page = <About navigate={navigate} />; break;
    case 'contact': page = <Contact navigate={navigate} />; break;
    default: page = <NotFound navigate={navigate} />;
  }

  const showChrome = isVerified && !['register', 'verify'].includes(route);

  return (
    <div className="min-h-screen bg-bg">
      {showChrome && <Navbar route={route} navigate={navigate} />}
      <main>{page}</main>
      {showChrome && <Footer navigate={navigate} />}
      <ScrollToTopButton />
    </div>
  );
}

function App() {
  return (
    <AuthProvider>
      <AppShell />
    </AuthProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

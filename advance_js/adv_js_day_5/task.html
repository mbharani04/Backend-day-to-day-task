//task 15
const employees = [];

// Add Employee
const addEmployee = (
  id,
  name,
  department = "General",
  basicSalary = 0
) => {
  const employee = {
    id,
    name,
    department,
    basicSalary
  };

  employees.push(employee);
};

// Update Employee
const updateEmployee = (id, updates = {}) => {
  const index = employees.findIndex(emp => emp.id === id);

  if (index !== -1) {
    employees[index] = {
      ...employees[index],
      ...updates
    };
  }
};

// Display Employee
const displayEmployee = () => {
  employees.forEach(emp => {
    const { id, name, department, basicSalary } = emp;

    console.log(`
Employee ID : ${id}
Name        : ${name}
Department  : ${department}
Salary      : ${basicSalary}
`);
  });
};

// Calculate Salary
const calculateSalary = (...salaries) =>
  salaries.reduce((total, salary) => total + salary, 0);

// Add Employees
addEmployee(101, "Bharani", "Developer", 50000);
addEmployee(102, "Kumar", "Tester", 40000);

// Update Employee
updateEmployee(101, {
  department: "Full Stack Developer",
  basicSalary: 65000
});

// Display
displayEmployee();

// Salary Calculation
console.log(
  `Total Salary = ₹${calculateSalary(
    ...employees.map(emp => emp.basicSalary)
  )}`
);
